# ─────────────────────────────────────────────────────────────
# AIPromo - Infrastructure Services
# ─────────────────────────────────────────────────────────────

services:
  # ───────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: AIPromo-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AIPromo123}
      POSTGRES_DB: ${POSTGRES_DB:-AIPromo}
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aipromo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-AIPromo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ───────────────────────────────────────────────────────────
  # Redis Cache
  # ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: AIPromo-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-AIPromo123} --appendonly yes
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aipromo-network

  # ───────────────────────────────────────────────────────────
  # Redis Web GUI (Redis Insight)
  # ───────────────────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: AIPromo-redis-insight
    restart: unless-stopped
    ports:
      - "${REDIS_INSIGHT_PORT:-5540}:5540"
    volumes:
      - redis_insight_data:/data
    networks:
      - aipromo-network
    depends_on:
      - redis

  # ───────────────────────────────────────────────────────────
  # RabbitMQ Message Broker
  # ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: AIPromo-rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - aipromo-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ───────────────────────────────────────────────────────────
  # MinIO Object Storage
  # ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: AIPromo-minio
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - aipromo-network

  # ───────────────────────────────────────────────────────────
  # Qdrant Vector Database
  # ───────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: AIPromo-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_EXPOSE_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aipromo-network

volumes:
  postgres_data:
  redis_data:
  redis_insight_data:
  rabbitmq_data:
  minio_data:
  qdrant_data:
