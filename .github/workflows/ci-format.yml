name: CI - Formatting

on:
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Verify Formatting
      # THIS IS THE MAGIC LINE:
      continue-on-error: true 
      run: dotnet format src/Backend/Capstone.sln --verify-no-changes --severity warn