name: Full CI Pipeline

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

# Prevent concurrent runs on the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    env:
      ASPNETCORE_ENVIRONMENT: CI
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Explicitly target .NET 9 SDK (stable/GA only)
        dotnet-version: '9.0.x'
        dotnet-quality: 'ga'
        # Enable NuGet caching for faster restores
        cache: true
        # Cache dependencies for all backend projects
        cache-dependency-path: src/Backend/**/*.csproj

    - name: Verify .NET Version
      run: |
        echo "Verifying .NET SDK version..."
        dotnet --version
        dotnet --list-sdks
        # Ensure we're using .NET 9.x
        if [[ ! "$(dotnet --version)" =~ ^9\. ]]; then
          echo "❌ Expected .NET 9.x, got $(dotnet --version)"
          exit 1
        fi
        echo "Using correct .NET version: $(dotnet --version)"

    - name: Restore dependencies
      run: dotnet restore src/Backend/Capstone.sln

    - name: Check Code Formatting
      run: dotnet format src/Backend/Capstone.sln --verify-no-changes --no-restore

    - name: Build solution
      run: dotnet build src/Backend/Capstone.sln --configuration Release --no-restore --warnaserror

    - name: Check for Vulnerable Packages
      run: dotnet list src/Backend/Capstone.sln package --vulnerable --fail-on-severity low

    - name: Publish Application
      run: dotnet publish src/Backend/Api/Api/Api.csproj --configuration Release --no-build --output ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: publish-artifact
        path: ./publish/
        retention-days: 7
        if-no-files-found: error

    # - name: Run Smoke Test (Optional Future Step)
    #   run: |
    #     dotnet ./publish/Api.dll &
    #     sleep 5
    #     curl --fail http://localhost:5000/health || exit 1