name: Full CI Pipeline

on:
  push:
    branches: [ "dev", "main" ]   
  pull_request:
    branches: [ "dev", "main" ]   

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'   

    - name: Restore dependencies
      run: dotnet restore src/Backend/Capstone.sln --warnaserror

    - name: Build solution
      run: dotnet build src/Backend/Capstone.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test src/Backend/Capstone.sln --no-build --verbosity normal
