name: CI - EF Core Migrations

on:
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    
    env:
      # We override your specific variable name here. 
      # EF doesn't need a real DB to check 'has-pending-model-changes', 
      # but it DOES need the string to not be empty/null.
      Database__ConnectionString: "Server=localhost;Database=FakeDb;User Id=sa;Password=Password123!;TrustServerCertificate=True"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install EF Core CLI
      run: dotnet tool install --global dotnet-ef

    - name: Restore dependencies
      run: dotnet restore src/Backend/Capstone.sln

    - name: Build solution
      run: dotnet build src/Backend/Capstone.sln --configuration Debug --no-restore

    - name: Run Dynamic Migration Checker
      shell: pwsh
      run: ./Scripts/Shells/ci_check_migrations.ps1